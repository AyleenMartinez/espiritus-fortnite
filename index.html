<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Colección de Sprites de Fortnite - Checklist interactivo">
  <meta name="theme-color" content="#7c3aed">

  <title>Colección de Sprites Fortnite</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="contenedor-principal">

    <header class="encabezado">
      <h1 class="titulo-principal">🎮 Colección de Sprites Fortnite</h1>
      <p class="subtitulo-principal">Checklist personal de Pablongo Mongo</p>
    </header>

    <section class="seccion-estadisticas">
      <div class="tarjeta-estadistica">
        <div class="label-estadistica">Conseguidos</div>
        <div class="valor-estadistica" id="conseguidos-total">0</div>
      </div>

      <div class="tarjeta-estadistica">
        <div class="label-estadistica">Disponibles</div>
        <div class="valor-estadistica" id="total-espiritus">0</div>
      </div>

      <div class="tarjeta-estadistica">
        <div class="label-estadistica">Progreso</div>
        <div class="valor-estadistica" id="porcentaje-valor">0%</div>
      </div>

      <div class="tarjeta-estadistica">
        <div class="label-estadistica">Dominados</div>
        <div class="valor-estadistica" id="dominados-total">0</div>
      </div>
    </section>

    <div class="contenedor-progreso">
      <div class="label-progreso">
        <span>Progreso de sprites disponibles</span>
        <span id="porcentaje-completado-barra">0%</span>
      </div>

      <div class="fondo-barra">
        <div class="barra-progreso" id="barra-progreso"></div>
      </div>
    </div>

    <div class="barra-controles">
      <div class="contenedor-buscador">
        <input
          type="text"
          id="buscador"
          class="buscador"
          placeholder="🔍 Buscar sprite..."
        >
      </div>

      <div class="menu-rapido-sprites">
        <label for="select-sprites">Ir a:</label>
        <select id="select-sprites" class="select-sprites">
          <option value="">Elegir sprite...</option>
        </select>
      </div>

      <div class="filtro-compacto">
        <label for="select-filtros">Filtrar:</label>
        <select id="select-filtros" class="select-filtros"></select>
      </div>

      <button id="boton-toggle-unreleased" class="boton-toggle-unreleased" type="button">
        👁️ Ver unreleased
      </button>

      <button id="boton-reiniciar" class="boton-accion" type="button">
        🔄 Reiniciar
      </button>
    </div>

    <div id="contenedor-tarjetas"></div>

  </div>

  <button id="boton-subir" class="boton-subir" aria-label="Volver arriba">
    ↑
  </button>

  <script type="module" src="src/main.js"></script>
</body>

</html>
